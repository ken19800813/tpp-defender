name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Build Windows EXE
        run: |
          pyinstaller TPPchat_windows.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TPPchat-windows
          path: dist/
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Build macOS APP
        run: |
          pyinstaller TPPchat.spec

      - name: Create DMG (optional)
        run: |
          cd dist
          hdiutil create -volname "TPPchat" -srcfolder TPPchat.app -ov -format UDZO TPPchat.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TPPchat-macos
          path: dist/
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TPPchat-windows
          path: ./release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: TPPchat-macos
          path: ./release/macos

      - name: Debug - Show downloaded files structure
        run: |
          echo "=== Windows artifact structure ==="
          find ./release/windows -type f
          echo "=== macOS artifact structure ==="
          find ./release/macos -type f
          echo "=== All files ==="
          ls -lah ./release/

      - name: Prepare files for release
        run: |
          mkdir -p ./release/final
          # Find and copy Windows exe
          find ./release/windows -name "TPPchat.exe" -exec cp {} ./release/final/ \;
          # Find and copy macOS dmg
          find ./release/macos -name "TPPchat.dmg" -exec cp {} ./release/final/ \;
          # Copy installation guide
          cp 安裝說明.txt ./release/final/ 2>/dev/null || echo "Installation guide not found"
          echo "=== Final release files ==="
          ls -lah ./release/final/

      - name: Create or update Release
        # 改用 GitHub 官方 gh CLI 上傳（runner 內建），取代
        # softprops/action-gh-release@v1。後者上傳中文檔名附件時會把
        # 「安裝說明.txt」錯誤命名成「default.txt」（GitHub Release
        # assets API 對非 ASCII 檔名的編碼處理在該 action 版本有問題），
        # gh CLI 對 UTF-8 檔名的處理正確、穩定，是官方工具不會有這問題。
        # 用 `gh release view` 判斷 tag 是否已有 Release：已存在就用
        # --clobber 覆蓋附件（同一 tag 重跑不會失敗），不存在才新建。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" ./release/final/* --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" ./release/final/* --repo "${{ github.repository }}" \
              --title "$TAG" --generate-notes
          fi
