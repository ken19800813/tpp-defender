name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Build Windows EXE
        run: |
          pyinstaller TPPchat_windows.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TPPchat-windows
          path: dist/
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Build macOS APP
        run: |
          pyinstaller TPPchat.spec

      - name: Create DMG (optional)
        run: |
          cd dist
          hdiutil create -volname "TPPchat" -srcfolder TPPchat.app -ov -format UDZO TPPchat.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TPPchat-macos
          path: dist/
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TPPchat-windows
          path: ./release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: TPPchat-macos
          path: ./release/macos

      - name: Prepare files for release
        run: |
          mkdir -p ./release/final
          cp ./release/windows/TPPchat.exe ./release/final/ || echo "Windows exe not found"
          cp ./release/macos/TPPchat.dmg ./release/final/ || echo "macOS dmg not found"
          ls -lah ./release/final/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/final/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
